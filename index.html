            { q: "19. Cont 5121: SI=700, RC=2000, SF=3000. RD este:", options: ["a. 1000", "b. 1700", "c. 4300", "d. 1800"], correct: 2, expl: "🧠 <strong>Truc:</strong> SF = SI + RD - RC. Deci 3000 = 700 + RD - 2000. Rezultă 4300." },

            { q: "67. Stocul de la sfârşitul perioadei asigură:", options: ["a) limita consum", "b) utilizare capacitate", "c) utilizare forță", "d) desfăşurarea normală a procesului de producţie"], correct: 3, expl: "🧠 <strong>Truc:</strong> Să nu oprești fabrica de Anul Nou pentru că n-ai marfă pe stoc." },

            { q: "69. Indicator ce exprimă necesităţile materiale:", options: ["a) necesar aprovizionat", "b) alte resurse", "c) stoc la sfârşitul perioadei", "d) stoc preliminat"], correct: 2, expl: "🧠 <strong>Truc:</strong> Stocul tău necesar/cerut în rezervă (Barem: c)." },
            { q: "70. Stoc preliminat mai mare ca stoc faptic. Ce faci?", options: ["a) reducerea necesarului", "b) corectarea necesarului de aprovizionat în sensul majorării acestuia", "c) renunţare", "d) valorificare"], correct: 1, expl: "🧠 <strong>Truc:</strong> Credeai că ai 10 tone, la inventar ai doar 8. Trebuie să MĂREȘTI comanda de aprovizionare." },
            { q: "71. Suprapunere pregătire cu producția:", options: ["a) serie", "b) producţiei de unicate", "c) comandă", "d) masă"], correct: 1, expl: "🧠 <strong>Truc:</strong> La unicate (ex: vapoare), faci proiectul fix din mers în timp ce sudezi tabla." },
            { q: "72. Producţia de serie - caracteristici:", options: ["a) nomenclator larg", "b) produsele se lansează în loturi, care se repetă periodic", "c) întreţinere", "d) stabil"], correct: 1, expl: "🧠 <strong>Truc:</strong> Loturi de rochii mărimea M azi, mâine loturi mărimea L. (Serializat)." },
            { q: "73. Producția în masă (Masivă):", options: ["a) amplasarea maşinilor şi utilajelor este realizată în flux sub forma liniei tehnologice", "b) proiect după catalog", "c) nomenclator larg", "d) calificare muncitori"], correct: 0, expl: "🧠 <strong>Truc:</strong> Ca la fabricile de mașini, banda (fluxul tehnologic) merge non-stop." },
            { q: "74. Întreruperi interoperaţii:", options: ["a) sunt inerente producţiei de serie mijlocie şi mică", "b) nu afectează", "c) anormale", "d) neconcordanțe"], correct: 0, expl: "🧠 <strong>Truc:</strong> Când muți loturile de la o mașină la alta, e normal (inerent) să se piardă puțin timp între operații." },
            { q: "75. Ciclul de fabricaţie se determină:", options: ["a) numai ore", "b) ore şi zile calendaristice", "c) în ore, zile lucrătoare sau zile calendaristice", "d) numai zile lucrătoare"], correct: 2, expl: "🧠 <strong>Truc:</strong> Se măsoară de la cel mai scurt (ora) la cel mai lung (zile din calendar)." },
            { q: "76. Capacitatea de producţie:", options: ["a) după piață", "b) potențial", "c) producția maximă ce poate fi obținută într-o perioadă în condiții de folosire deplină", "d) după concurență"], correct: 2, expl: "🧠 <strong>Truc:</strong> Cât poate scoate fabrica alergând 100% din putere. Fără legătură cu piața." },
            { q: "77. 'Veriga de producţie' la calcul capacitate:", options: ["a) ansamblu operații", "b) utilajele unicate sau grupele de utilaje de aceleaşi tipuri şi dimensiuni", "c) totalitatea utilajelor", "d) ateliere"], correct: 1, expl: "🧠 <strong>Truc:</strong> Toate strungurile de același tip formează o verigă productivă de prelucrare." },
            { q: "78. Factori direcţi ce influențează capacitatea:", options: ["a) materie", "b) calificare", "c) fiabilitate", "d) indicatorul de utilizare intensivă a utilajului"], correct: 3, expl: "🧠 <strong>Truc:</strong> Capacitatea e calculată matematic din cât timp e aprins butonul mașinii (utilizare intensivă)." },
            { q: "79. Problemă Fiabilitate (MTBF / Rata căderilor):", options: ["a) 800", "b) 2133,3", "c) 1466,66; 6,81", "d) 2000"], correct: 2, expl: "🧠 <strong>Truc:</strong> Calcul de ore pe motoare. Barem: Varianta C." },
            { q: "80. Perioada infantilă a vieții produsului:", options: ["a) menținere scăzută", "b) nu se defectează", "c) nivelul ridicat al ratei căderilor", "d) constant"], correct: 2, expl: "🧠 <strong>Truc:</strong> Orice produs nou lansat are la început un nivel mare de defecte/'boli ale copilăriei' (infantilă)." },
            { q: "81. Rivalitatea e intensă în sector dacă:", options: ["a) produse diferențiate", "b) concurenți diferiți", "c) costurile fixe sunt mari", "d) ritm accelerat"], correct: 2, expl: "🧠 <strong>Truc:</strong> Ai o clădire uriașă și scumpă (Cost Fix Mare) -> dacă nu vinzi o zi te omoară rata, deci vei lupta 'pe sânge' cu rivalii." },
            { q: "82. Produsele de substituție:", options: ["a) competitorilor", "b) o altă modalitate de a satisface aceleași nevoi", "c) producător piață", "d) substituirea unei nevoi"], correct: 1, expl: "🧠 <strong>Truc:</strong> Te duci la Brașov cu trenul (produsul de bază) sau îl substitui cu BlaBlaCar (aceeași nevoie)." },
            { q: "83. Barieră la intrare (cost de acces):", options: ["a) fidelizarea cumpărătorilor", "b) slaba diferențiere", "c) avantaje de cost", "d) control"], correct: 0, expl: "🧠 <strong>Truc:</strong> Să spargi fidelitatea Apple pentru a lansa un telefon nou te costă miliarde pe Marketing." },
            { q: "84. Puterea clienților scade când:", options: ["a) costuri reduse", "b) nu influențează calitatea", "c) produsele achiziționate dețin valoric o pondere redusă în cifra de afaceri a vânzătorului", "d) oferta > cerere"], correct: 2, expl: "🧠 <strong>Truc:</strong> Dacă acel client îți cumpără doar de 50 de lei pe an, nu poate să vină cu pretenții uriașe, puterea lui e mică." },
            { q: "85. Nișa dă avantaj dacă:", options: ["a) segmentul nu este important pentru succesul concurenților mari", "b) prea mic", "c) potențial redus", "d) comasare"], correct: 0, expl: "🧠 <strong>Truc:</strong> Uriașii ignoră firimiturile. Acolo intervii tu (pe nișă)." },
            { q: "86. Efectul de experiență:", options: ["a) descreşterea cu procent constant a costului unitar la dublarea producției cumulate", "b) scăderea orelor", "c) diminuare cost", "d) constant"], correct: 0, expl: "🧠 <strong>Truc:</strong> După ce ai făcut 100 de pizza, te miști mai repede și consumi mai puțin curent per pizza." },
            { q: "87. Mărime minimă să nu suporte handicap (să existe):", options: ["a) masa critică", "b) prag financiar", "c) prag comercial", "d) prag tehnic"], correct: 0, expl: "🧠 <strong>Truc:</strong> Minimul de volum ca să supraviețuiești pe piață se numește Masă Critică." },
            { q: "88. Diferenţierea funcţionează optim când:", options: ["a) nevoi standardizate", "b) există multe căi de diferențiere", "c) firme folosesc aceeași metodă", "d) clienți nu văd diferența"], correct: 1, expl: "🧠 <strong>Truc:</strong> Evident. Ai nevoie de loc ca să te joci cu culorile/formele pe piață." },
            { q: "89. Dimensiunea atinsă pentru productivitate acceptabilă:", options: ["a) masa", "b) prag fin", "c) prag com", "d) pragul tehnic"], correct: 3, expl: "🧠 <strong>Truc:</strong> Are legătură cu uzina/tehnica (Barem D)." },
            { q: "90. Exercitarea în comun dă un rezultat > decât suma lor (2+2=5):", options: ["a) avantaj", "b) financiar", "c) curbă", "d) sinergie"], correct: 3, expl: "🧠 <strong>Truc:</strong> Sin+Ergie = energii împreunate care se amplifică." },
            { q: "91. Dominanta management antreprenorial:", options: ["a) Puternica sa pesonalizare", "b) Accent redus pe inovare", "c) Facilitare redusă", "d) Strategii riguroase"], correct: 0, expl: "🧠 <strong>Truc:</strong> Firma ia fix personalitatea patronului ei (Ex: Elon Musk cu Tesla)." },
            { q: "92. Efecte pozitive patron=manager:", options: ["a) Suportul motivational de eficacitate maxima pentru intreprinzator", "b) Concentrare", "c) Angajare specialiști", "d) Diversitate redusă"], correct: 0, expl: "🧠 <strong>Truc:</strong> Când e firma ta, tragi de 100 de ori mai tare ca un angajat normal." },
            { q: "93. Flexibilitatea intreprinderii:", options: ["a) Atragere", "b) Posibilitate", "c) Complexitate", "d) Modificarea facilă a starilor acesteia in raport cu transformarile mediului"], correct: 3, expl: "🧠 <strong>Truc:</strong> Flexibil = te poți îndoi/modifica cum bate vântul crizei." },
            { q: "94. Adaptabilitate:", options: ["a) Posibilitatea de a identifica rapid si de a reactiona la perturbatiile din mediu", "b) Investiții", "c) Salariați", "d) Strategii lungi"], correct: 0, expl: "🧠 <strong>Truc:</strong> Adaptarea e viteză de reacție la problemele apărute." },
            { q: "95. Mobilitatea IMM:", options: ["a) Pozitionarea in piata in proximitatea clientilor sau surselor", "b) Aprovizionare ritmică", "c) Livrare", "d) Schimbare sediu", "e) Schimbare personal"], correct: 0, expl: "🧠 <strong>Truc:</strong> Fiind mici, IMM-urile își pot construi ghereta chiar la baza clădirii unde stau clienții." },
            { q: "96. Previziunea la IMM-uri:", options: ["a) Atentia insuficienta acordata strategiei de dezvoltare", "b) Atentie sporita", "c) Plan afaceri", "d) Proceduri formalizate"], correct: 0, expl: "🧠 <strong>Truc:</strong> Patronii mici supraviețuiesc de pe-o zi pe alta. Nu stau să scrie planuri groase pe 5 ani." },
            { q: "97. Organizarea la IMM-uri:", options: ["a) Structura organică cu o descriere generala a functiilor", "b) Insuficienta", "c) Rigidă", "d) Linii lungi"], correct: 0, expl: "🧠 <strong>Truc:</strong> Fiind puțini, azi ești casier, mâine ești șofer. (Organică, nu e strictă)." },
            { q: "98. Antrenarea la IMM-uri:", options: ["a) Relatii interpersonale stranse/directe care permit motivare rapida", "b) Nivel scăzut", "c) Greoaie", "d) Lipsă drept"], correct: 0, expl: "🧠 <strong>Truc:</strong> Patronul își știe toți cei 5 angajați și îi motivează față-în-față imediat." },
            { q: "99. Coordonarea la IMM-uri:", options: ["a) Predominanta comunicatiilor informale", "b) Formale", "c) Lipsa de interes", "d) Interdicția contactelor"], correct: 0, expl: "🧠 <strong>Truc:</strong> Nu-i trimiți email colegului care stă în aceeași cameră. Totul se vorbește la liber (informal)." },
            { q: "100. Controlul la IMM-uri:", options: ["a) Se poate efectua direct, fara intermediari", "b) Indirect", "c) Diferite persoane", "d) Clasice"], correct: 0, expl: "🧠 <strong>Truc:</strong> Patronul face și inspecția de calitate, nu există departament separat de control." }
        ];

        // =====================================================================
        // TAB-URI ȘI RENDERIZARE
        // =====================================================================
        function showMainTab(tabId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            const subMenu = document.getElementById('sub-menu-fufe');
            subMenu.style.display = (tabId === 'fufe') ? 'flex' : 'none';
        }

        function showSubTab(subTabId, btn) {
            document.querySelectorAll('.sub-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sub-nav-tabs .sub-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(subTabId).classList.add('active');
            btn.classList.add('active');
        }

        function renderQuiz(dataArray, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const progress = document.createElement('div');
            progress.className = 'progress-text';
            progress.innerHTML = `Total grile: ${dataArray.length}`;
            container.appendChild(progress);

            dataArray.forEach((item, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.innerHTML = item.q;
                
                const btnGrid = document.createElement('div');
                btnGrid.className = 'btn-grid';
                
                item.options.forEach((optText, oIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerHTML = optText;
                    btn.onclick = function() { checkAnswer(this, qIndex, oIndex, dataArray, containerId); };
                    btnGrid.appendChild(btn);
                });

                const explDiv = document.createElement('div');
                explDiv.id = `expl-${containerId}-${qIndex}`;
                explDiv.className = 'explanation';
                explDiv.innerHTML = item.expl;

                container.appendChild(qDiv);
                container.appendChild(btnGrid);
                container.appendChild(explDiv);
            });
        }

        function checkAnswer(clickedBtn, qIndex, oIndex, dataArray, containerId) {
            const btnGrid = clickedBtn.parentElement;
            const buttons = btnGrid.querySelectorAll('button');
            const explDiv = document.getElementById(`expl-${containerId}-${qIndex}`);
            
            buttons.forEach(b => b.disabled = true);
            
            if (oIndex === dataArray[qIndex].correct) {
                clickedBtn.classList.add('correct');
            } else {
                clickedBtn.classList.add('wrong');
                buttons[dataArray[qIndex].correct].classList.add('correct');
            }
            explDiv.style.display = 'block';
        }

        // Renderizam direct continutul in cutiile destinate
        renderQuiz(fundamentaleData, 'quiz-fundamentale');
        renderQuiz(specialitateData, 'quiz-specialitate');
        // Observa magie aici: Pentru fete chemam tot "fundamentaleData" pe prima sectiune!
        renderQuiz(fundamentaleData, 'quiz-fufe-fundamentale');
        renderQuiz(fufeSpecialitateData, 'quiz-fufe-specialitate');
    </script>
